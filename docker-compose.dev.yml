# Development overrides for docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    container_name: catalin-ene-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - catalin-ene-network
    restart: unless-stopped

  backend:
    build:
      target: dev
    container_name: catalin-ene-backend-dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:redis_pass@redis:6379}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - OWNER_EMAIL=${OWNER_EMAIL}
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/uploads:/app/uploads
      - ./backend/invoices:/app/invoices
    ports:
      - "3000:3000"
    networks:
      - catalin-ene-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 10

  frontend:
    build:
      target: dev
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost/api}
    container_name: catalin-ene-frontend-dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3010:3010"
    networks:
      - catalin-ene-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - backend

  redis:
    ports:
      - "6379:6379"
    networks:
      - catalin-ene-network

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-catalin_ene_dev}
      POSTGRES_USER: ${DB_USER:-catalin_ene}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-catalin_ene_pass}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - catalin-ene-network

  portainer:
    ports:
      - "9000:9000"
    networks:
      - catalin-ene-network

  imgproxy:
    image: darthsim/imgproxy:v3.24
    container_name: catalin-ene-imgproxy-dev
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/uploads
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_ENABLE_WEBP_DETECTION=true
      - IMGPROXY_ENFORCE_WEBP=true
      - IMGPROXY_QUALITY=85
    volumes:
      - ./backend/uploads:/uploads:ro
    ports:
      - "8081:8080"
    networks:
      - catalin-ene-network

networks:
  catalin-ene-network:
    external: true

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
